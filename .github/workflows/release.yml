name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew ./scripts/run-release-smoke.sh ./scripts/verify-release-version.sh

      - name: Run release smoke checks
        run: ./scripts/run-release-smoke.sh "${GITHUB_REF}"

      - name: Render release notes from changelog
        run: ./scripts/render-release-notes.sh "${GITHUB_REF}" build/release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/*.jar
            build/libs/*.jar.sha256
            CHANGELOG.md
          body_path: build/release-notes.md
          generate_release_notes: true
